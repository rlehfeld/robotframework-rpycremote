name: Pipeline Tests

on:
  workflow_dispatch:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]
  schedule:
    - cron: 0 0 * * *

permissions:
  contents: read

jobs:
  flake8:
    strategy:
      matrix:
        os: [ 'ubuntu-latest' ]
        python-version: &PYTHON_VERSIONS [ '3.10', '3.11', '3.12', '3.13', '3.14' ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U flake8 flake8-polyfill robotframework
      - name: Analysing the code with flake8
        run: |
          flake8 --count --show-source --max-complexity=12 --statistics -- $(git ls-files '*.py')

  pylint:
    strategy:
      matrix:
        os: [ 'ubuntu-latest' ]
        python-version: *PYTHON_VERSIONS
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U setuptools_scm setuptools pylint robotframework pyyaml rpyc-ng pydantic
      - name: Analysing the code with pylint
        run: |
          pylint --module-naming-style=any $(git ls-files '*.py')

  robot-framework:
    strategy:
      fail-fast: false
      matrix:
        os: [ 'ubuntu-latest', 'windows-latest' ]
        python-version: *PYTHON_VERSIONS
        robotframework-version: [ '6.1', '7.0', 'latest' ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
          pip install -U setuptools_scm setuptools
      - name: Install dependencies
        run: |
          pip install pyyaml pydantic
      - name: Install robotframework latest
        if: ${{ matrix.robotframework-version == 'latest' }}
        run: |
          pip install -U robotframework
      - name: Install robotframework ${{ matrix.robotframework-version }}
        if: ${{ matrix.robotframework-version != 'latest' }}
        run: |
          pip install robotframework==${{ matrix.robotframework-version }}
      - name: Install RPyCRobotRemote
        run: |
          pip install -e .
      - name: Executing Robot Framework Tests
        env:
          PYTHONPATH: 'test'
        run: |
          python test/server.py 2>&1 &
          sleep 3
          libdoc RPyCRobotRemote::127.0.0.1::18861 testreports/MyLibrary.html
          robot -d testreports/ test/ 2>&1
      - name: Upload Generated Robot Test Report and Robot Doc
        uses: actions/upload-artifact@v7
        with:
          name: testreports-${{ matrix.os }}-${{ matrix.python-version }}-${{ matrix.robotframework-version }}
          path: testreports
